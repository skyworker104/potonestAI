<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PhotoNest AI — 내 사진의 모든 것</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<link rel="stylesheet" href="styles.css?v=22">
</head>
<body>
<div id="app">
  <!-- 좌측 네비게이션 레일 -->
  <nav id="nav-rail">
    <button class="nav-btn active" data-view="photos" title="사진"><span>🖼️</span><label>사진</label></button>
    <button class="nav-btn" data-view="map" title="지도"><span>🗺️</span><label>지도</label></button>
    <button class="nav-btn" data-view="people" title="인물"><span>👤</span><label>인물</label></button>
    <button class="nav-btn" data-view="albums" title="앨범"><span>📁</span><label>앨범</label></button>
    <button class="nav-btn" data-view="favorites" title="즐겨찾기"><span>⭐</span><label>즐겨찾기</label></button>
    <button class="nav-btn" data-view="duplicates" title="중복 정리"><span>🧹</span><label>중복</label></button>
    <button class="nav-btn" data-view="trash" title="휴지통"><span>🗑️</span><label>휴지통</label></button>
    <button class="nav-btn" data-view="phone" title="폰 연결"><span>📱</span><label>폰 연결</label></button>
    <div class="nav-spacer"></div>
    <button class="nav-btn" id="fullscreen-btn" title="전체화면 (시스템바 숨기기)"><span>⛶</span><label>전체화면</label></button>
    <button class="nav-btn" id="chat-toggle" title="AI 대화 열기/닫기"><span>💬</span><label>AI</label></button>
  </nav>

  <!-- AI 대화 패널 -->
  <aside id="chat-panel">
    <header id="chat-header">
      <div class="logo">📷 PhotoNest <span>AI</span>
        <button id="help-btn" title="도움말·예시·배운 검색">❔</button>
        <button id="settings-btn" title="AI 엔진 설정">⚙️</button>
      </div>
      <div id="index-status">색인 준비 중…</div>
    </header>
    <div id="chat-log"></div>
    <div id="voice-orb-wrap">
      <button id="voice-orb" title="음성 대화 시작/중지">
        <svg viewBox="0 0 24 24" width="34" height="34" fill="currentColor">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
        </svg>
      </button>
      <div id="voice-state">마이크를 눌러 음성 대화를 시작하세요</div>
    </div>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="예: 작년 여름 바닷가 사진 찾아줘" autocomplete="off">
      <button type="submit">전송</button>
    </form>
  </aside>

  <!-- 메인 콘텐츠 -->
  <main id="main">
    <div id="topbar">
      <h2 id="view-title">사진</h2>
      <span id="view-count"></span>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div id="selection-bar" hidden>
      <button id="sel-cancel" title="선택 취소">✕</button>
      <span id="sel-count">0개 선택됨</span>
      <div class="sel-actions">
        <button id="sel-album">📁 앨범에 추가</button>
        <button id="sel-fav">⭐ 즐겨찾기</button>
        <button id="sel-trash">🗑️ 휴지통</button>
        <button id="sel-album-remove" hidden>📤 앨범에서 제거</button>
        <button id="sel-restore" hidden>♻️ 복원</button>
        <button id="sel-delete" hidden>❌ 영구 삭제</button>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>

<!-- 라이트박스 -->
<div id="lightbox" hidden>
  <div id="lb-topbar">
    <button id="lb-close" title="닫기 (음성: '닫아줘')">✕</button>
    <div class="lb-actions">
      <button id="lb-fav" title="즐겨찾기 (음성: '즐겨찾기 추가')">☆</button>
      <button id="lb-album" title="앨범에 추가">📁</button>
      <button id="lb-slideshow" title="슬라이드쇼 (음성: '슬라이드쇼')">▶</button>
      <button id="lb-info-btn" title="상세정보·지도 (음성: '정보 보여줘')">ℹ️</button>
      <button id="lb-trash" title="휴지통 (음성: '삭제해줘')">🗑️</button>
    </div>
  </div>
  <button id="lb-prev" title="이전 (음성: '이전 사진')">‹</button>
  <button id="lb-next" title="다음 (음성: '다음 사진')">›</button>
  <div id="lb-body">
    <div id="lb-media"></div>
    <div id="lb-info">
      <h3 id="lb-name"></h3>
      <p id="lb-date"></p>
      <p id="lb-loc"></p>
      <div id="lb-exif"></div>
      <div id="lb-comment-box">
        <label>📝 내 코멘트 <small>(검색에 함께 활용됩니다)</small></label>
        <textarea id="lb-comment" rows="2" placeholder="이 사진에 대한 메모를 남겨보세요. 예: 제주도 협재 해변에서 아이와 물놀이"></textarea>
        <div id="lb-comment-actions">
          <span id="lb-comment-status"></span>
          <button id="lb-comment-save">저장</button>
        </div>
      </div>
      <div id="lb-map"></div>
    </div>
  </div>
</div>

<!-- 슬라이드쇼 -->
<div id="slideshow" hidden>
  <img id="ss-img" alt="">
  <div id="ss-controls">
    <button id="ss-prev">‹</button>
    <button id="ss-pause">⏸</button>
    <button id="ss-next">›</button>
    <button id="ss-exit">✕</button>
  </div>
</div>

<!-- 설정 모달 (AI 엔진 / OpenRouter) -->
<div id="settings-modal" hidden>
  <div class="modal-box">
    <h3>⚙️ AI 대화 엔진 설정</h3>
    <p class="settings-hint">발화를 검색 의도로 해석하는 엔진을 고릅니다. 이미지 검색(CLIP)은 항상 로컬에서 동작합니다.</p>

    <div class="settings-group">
      <label class="settings-label">엔진 선택</label>
      <div id="engine-options">
        <label class="engine-opt"><input type="radio" name="engine_mode" value="auto"><span><b>자동</b> — OpenRouter(키 있으면) → 로컬 → Claude → 기본</span></label>
        <label class="engine-opt"><input type="radio" name="engine_mode" value="openrouter"><span><b>OpenRouter</b> — 클라우드 모델(키 필요)</span></label>
        <label class="engine-opt"><input type="radio" name="engine_mode" value="local"><span><b>로컬 LLM</b> — LM Studio / Ollama 자동탐지</span></label>
        <label class="engine-opt"><input type="radio" name="engine_mode" value="claude"><span><b>Claude</b> — ANTHROPIC_API_KEY 사용</span></label>
      </div>
    </div>

    <div class="settings-group" id="openrouter-fields">
      <label class="settings-label">OpenRouter API 키
        <a href="https://openrouter.ai/keys" target="_blank" rel="noopener">키 발급 ↗</a>
      </label>
      <input id="or-key" type="password" placeholder="sk-or-v1-..." autocomplete="off">
      <label class="settings-label">모델</label>
      <input id="or-model" type="text" list="or-model-presets" placeholder="예: google/gemini-2.5-flash-lite" autocomplete="off">
      <datalist id="or-model-presets"></datalist>
      <div class="settings-row">
        <button id="or-test" class="btn-secondary">연결 테스트</button>
        <span id="or-test-status"></span>
      </div>
    </div>

    <div class="modal-new" style="justify-content:flex-end">
      <button class="modal-close" id="settings-close">닫기</button>
      <button id="settings-save">저장</button>
    </div>
  </div>
</div>

<!-- 앨범 선택/생성 모달 -->
<div id="album-modal" hidden>
  <div class="modal-box">
    <h3>앨범에 추가</h3>
    <div id="album-modal-list"></div>
    <div class="modal-new">
      <input id="album-modal-name" type="text" placeholder="새 앨범 이름">
      <button id="album-modal-create">만들기</button>
    </div>
    <button class="modal-close" id="album-modal-close">취소</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="app.js?v=22"></script>
<script src="views.js?v=20"></script>
<script src="lightbox.js?v=23"></script>
<script src="voice.js?v=23"></script>
</body>
</html>
